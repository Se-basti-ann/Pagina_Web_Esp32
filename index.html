<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>GPS Moto</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#111;color:#fff;font-family:Arial,sans-serif;
       display:flex;flex-direction:column;align-items:center;padding:12px;min-height:100vh}
  h2{color:#0ff;margin-bottom:10px;font-size:1.1rem}

  .card{width:100%;max-width:440px;background:#1a1a2e;border-radius:12px;
        padding:14px;margin-bottom:10px}

  /* WebSocket */
  #ws-row{display:flex;gap:8px;width:100%;max-width:440px;margin-bottom:6px}
  #ws-input{flex:1;padding:9px;border-radius:8px;border:1px solid #555;
            background:#222;color:#fff;font-size:0.95rem}
  #ws-btn{padding:9px 14px;border-radius:8px;border:none;
          background:#ffa500;color:#000;font-weight:bold;cursor:pointer}
  #ws-status{width:100%;max-width:440px;font-size:0.8rem;color:#888;margin-bottom:6px}
  #gps-bar{width:100%;max-width:440px;font-size:0.78rem;color:#666;
           padding:4px 0;margin-bottom:8px;min-height:20px}

  /* Tabs de modo */
  #mode-tabs{display:flex;gap:6px;width:100%;max-width:440px;margin-bottom:10px}
  .tab{flex:1;padding:9px;border-radius:8px;border:2px solid #333;
       background:#222;color:#777;font-weight:bold;font-size:0.85rem;
       cursor:pointer;text-align:center;transition:all .2s}
  .tab.active{border-color:#0ff;color:#0ff;background:#0d1b2a}

  /* Panel modo texto */
  #panel-text{display:none;width:100%;max-width:440px}
  #dest-row{display:flex;gap:8px;margin-bottom:8px}
  #dest-input{flex:1;padding:9px;border-radius:8px;border:1px solid #555;
              background:#222;color:#fff;font-size:0.95rem}
  button.go{padding:9px 16px;border-radius:8px;border:none;
            background:#0ff;color:#000;font-weight:bold;cursor:pointer}

  /* Panel modo link */
  #panel-link{display:none;width:100%;max-width:440px}
  .how-to{background:#0d1b2a;border-radius:10px;padding:12px;
           margin-bottom:8px;font-size:0.8rem;color:#aaa;line-height:1.7}
  .how-to b{color:#0ff}
  .how-to .step{display:flex;gap:8px;align-items:flex-start;margin-bottom:4px}
  .how-to .num{background:#0ff;color:#000;border-radius:50%;
               width:20px;height:20px;display:flex;align-items:center;
               justify-content:center;font-weight:bold;font-size:0.75rem;
               flex-shrink:0;margin-top:1px}
  #link-row{display:flex;gap:8px;margin-bottom:8px}
  #link-input{flex:1;padding:9px;border-radius:8px;border:1px solid #0ff;
              background:#222;color:#fff;font-size:0.85rem}
  button.parse-btn{padding:9px 14px;border-radius:8px;border:none;
                   background:#0ff;color:#000;font-weight:bold;cursor:pointer}

  /* Confirm */
  #confirm-panel{display:none;width:100%;max-width:440px;
                 background:#0d1b2a;border-radius:12px;padding:14px;margin-bottom:10px}
  #confirm-panel .dest-name{font-size:1rem;color:#fff;font-weight:bold;margin-bottom:6px}
  #confirm-panel .dest-meta{font-size:0.78rem;color:#aaa;margin-bottom:12px;line-height:1.5}
  .confirm-btns{display:flex;gap:10px}
  .btn-yes{flex:1;padding:10px;border-radius:8px;border:none;
           background:#0f0;color:#000;font-weight:bold;font-size:1rem;cursor:pointer}
  .btn-no{flex:1;padding:10px;border-radius:8px;border:none;
          background:#555;color:#fff;font-weight:bold;cursor:pointer}

  /* Stop */
  #stop-btn{display:none;width:100%;max-width:440px;padding:10px;
            border-radius:8px;border:none;background:#f44;color:#fff;
            font-weight:bold;font-size:1rem;cursor:pointer;margin-bottom:10px}

  /* Mapa */
  #map{width:100%;max-width:440px;height:220px;border-radius:10px;
       border:1px solid #333;margin-bottom:10px;display:none}

  /* Status */
  #status{width:100%;max-width:440px;background:#1a1a2e;border-radius:8px;
          padding:10px;margin-bottom:10px;font-size:0.85rem;color:#aaa;display:none}

  /* Nav panel */
  #nav-panel{width:100%;max-width:440px;background:#0d1b2a;border-radius:12px;
             padding:16px;display:none;flex-direction:column;align-items:center;gap:8px}
  #arrow-box{font-size:4.5rem;line-height:1}
  #maneuver-text{font-size:1rem;color:#0ff;font-weight:bold;text-align:center}
  #distance-text{font-size:2rem;color:#ffa500;font-weight:bold}

  /* Steps */
  #step-list{width:100%;max-width:440px;margin-top:8px}
  .step-item{background:#1a1a2e;border-radius:8px;padding:7px 10px;
             margin-bottom:5px;font-size:0.82rem;color:#ccc;
             display:flex;gap:8px;align-items:center}
  .step-item.active-step{border-left:3px solid #0ff;color:#fff}
  .step-dist{color:#ffa500;font-weight:bold;min-width:50px}

  /* Speed badge */
  #speed-badge{position:fixed;bottom:16px;right:16px;
               background:#ffa500;color:#000;border-radius:50%;
               width:64px;height:64px;display:none;
               flex-direction:column;align-items:center;justify-content:center;
               font-weight:bold;font-size:1.1rem;box-shadow:0 2px 8px #0008;z-index:999}
  #speed-badge .unit{font-size:0.55rem;margin-top:-2px}
</style>

<body>
<h2>🏍️ GPS Moto Display</h2>

<!-- WebSocket -->
<div id="ws-row">
  <input id="ws-input" type="text" placeholder="IP del ESP32 ej: 192.168.1.106"/>
  <button id="ws-btn" onclick="connectWS()">Conectar</button>
</div>
<div id="ws-status">⚡ Sin conectar al display</div>
<div id="gps-bar">📡 Obteniendo GPS...</div>

<!-- Tabs -->
<div id="mode-tabs">
  <div class="tab active" onclick="setMode('link')" id="tab-link">🔗 Link Google Maps</div>
  <div class="tab"        onclick="setMode('text')" id="tab-text">⌨️ Escribir dirección</div>
</div>

<!-- Panel: pegar link -->
<div id="panel-link">
  <div class="how-to">
    <div class="step"><div class="num">1</div><span>Abre <b>Google Maps</b> en tu celular y busca tu destino</span></div>
    <div class="step"><div class="num">2</div><span>Toca el lugar → botón <b>"Compartir"</b> → <b>"Copiar enlace"</b></span></div>
    <div class="step"><div class="num">3</div><span>Pega el link aquí abajo y toca <b>Usar</b></span></div>
  </div>
  <div id="link-row">
    <input id="link-input" type="text" placeholder="https://maps.app.goo.gl/...  o  https://www.google.com/maps/..."/>
    <button class="parse-btn" onclick="parseGMapsLink()">Usar ▶</button>
  </div>
</div>

<!-- Panel: escribir dirección -->
<div id="panel-text">
  <div id="dest-row">
    <input id="dest-input" type="text" placeholder="Ej: Cra 94G #85-91, Bogotá"
           onkeydown="if(event.key==='Enter') searchText()"/>
    <button class="go" onclick="searchText()">Buscar</button>
  </div>
</div>

<!-- Mapa -->
<div id="map"></div>

<!-- Confirmación -->
<div id="confirm-panel">
  <div class="dest-name" id="confirm-name"></div>
  <div class="dest-meta" id="confirm-meta"></div>
  <div class="confirm-btns">
    <button class="btn-yes" onclick="startNav()">✅ Iniciar ruta</button>
    <button class="btn-no"  onclick="cancelDest()">✏️ Cambiar</button>
  </div>
</div>

<!-- Status -->
<div id="status"></div>

<!-- Stop -->
<button id="stop-btn" onclick="stopNav()">✕ Detener navegación</button>

<!-- Nav -->
<div id="nav-panel">
  <div id="arrow-box">⬆️</div>
  <div id="maneuver-text">Continúa recto</div>
  <div id="distance-text">--</div>
  <div id="street-name">--</div>
  <div id="eta-row">
    <span>🕐 <span id="eta-val">--</span></span>
    <span>🛣️ <span id="dist-total">--</span></span>
  </div>
</div>
<div id="step-list"></div>

<!-- Velocidad flotante -->
<div id="speed-badge">
  <span id="speed-val">0</span>
  <span class="unit">km/h</span>
</div>

<script>
// ── Estado global ────────────────────────────────────────────
let ws=null, userLat=null, userLon=null, destLat=null, destLon=null;
let steps=[], currentStep=0, navActive=false;
let map=null, userMarker=null, destMarker=null, routeLine=null;
let currentSpeed = 0;

const ARROWS={
  'turn-left':'⬅️','turn-right':'➡️','turn-slight-left':'↖️','turn-slight-right':'↗️',
  'turn-sharp-left':'↩️','turn-sharp-right':'↪️','uturn':'🔄','roundabout':'🔃',
  'straight':'⬆️','depart':'🚀','arrive':'🏁','exit':'↗️','merge':'⬆️'
};
const MANEUVER_ES={
  'turn-left':'Gira a la izquierda','turn-right':'Gira a la derecha',
  'turn-slight-left':'Gira levemente izquierda','turn-slight-right':'Gira levemente derecha',
  'turn-sharp-left':'Giro cerrado izquierda','turn-sharp-right':'Giro cerrado derecha',
  'uturn':'Giro en U','roundabout':'Entra a la rotonda','straight':'Continúa recto',
  'depart':'Inicia recorrido','arrive':'¡Llegaste!','exit':'Toma la salida','merge':'Incorpora al carril'
};

// ── Tabs de modo ────────────────────────────────────────────
function setMode(m) {
  document.getElementById('panel-link').style.display = m==='link' ? 'block' : 'none';
  document.getElementById('panel-text').style.display = m==='text' ? 'block' : 'none';
  document.getElementById('tab-link').classList.toggle('active', m==='link');
  document.getElementById('tab-text').classList.toggle('active', m==='text');
}
setMode('link');

// ── WebSocket ────────────────────────────────────────────────
function connectWS() {
  const ip = document.getElementById('ws-input').value.trim();
  if (!ip) { setWS('⚠️ Escribe la IP'); return; }
  if (ws) ws.close();
  ws = new WebSocket('ws://' + ip + ':81');
  ws.onopen  = () => setWS('✅ Conectado · ' + ip);
  ws.onclose = () => setWS('🔴 Desconectado');
  ws.onerror = () => setWS('❌ Error — verifica IP y WiFi');
}
function setWS(t) { document.getElementById('ws-status').textContent = t; }

function sendToDisplay(maneuver, street, distance, speed, eta) {
  if (ws && ws.readyState === WebSocket.OPEN)
    ws.send(JSON.stringify({ maneuver, street, distance, speed, eta }));
}

// ── GPS ──────────────────────────────────────────────────────
function startGPS() {
  if (!navigator.geolocation) {
    document.getElementById('gps-bar').textContent = '❌ GPS no disponible'; return;
  }
  navigator.geolocation.watchPosition(
    pos => {
      userLat = pos.coords.latitude;
      userLon = pos.coords.longitude;
      currentSpeed = pos.coords.speed ? Math.round(pos.coords.speed * 3.6) : 0;
      const spdTxt = currentSpeed > 0 ? '  •  ' + currentSpeed + ' km/h' : '';
      document.getElementById('gps-bar').textContent =
        '📍 ' + userLat.toFixed(5) + ', ' + userLon.toFixed(5) + spdTxt;

      // Badge de velocidad flotante
      if (navActive) {
        const badge = document.getElementById('speed-badge');
        badge.style.display = 'flex';
        document.getElementById('speed-val').textContent = currentSpeed;
      }

      if (map && userMarker) userMarker.setLatLng([userLat, userLon]);
      if (navActive) updateStep();
    },
    err => { document.getElementById('gps-bar').textContent = '❌ GPS: ' + err.message; },
    { enableHighAccuracy: true, maximumAge: 2000, timeout: 10000 }
  );
}

// ════════════════════════════════════════════════════════════
// ── MODO 1: Extraer coordenadas de link de Google Maps ──────
// ════════════════════════════════════════════════════════════
async function parseGMapsLink() {
  let raw = document.getElementById('link-input').value.trim();
  if (!raw) { setStatus('⚠️ Pega un link de Google Maps', true); return; }

  setStatus('🔍 Leyendo link...', true);
  hideConfirmPanel();

  try {
    // ── Intentar extraer coordenadas directamente del URL ───
    let lat = null, lon = null, placeName = '';

    // Formato largo: /maps/place/.../@LAT,LON,...
    let m = raw.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
    if (m) { lat = parseFloat(m[1]); lon = parseFloat(m[2]); }

    // Formato: /maps?q=LAT,LON
    if (!lat) {
      m = raw.match(/[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/);
      if (m) { lat = parseFloat(m[1]); lon = parseFloat(m[2]); }
    }

    // Formato corto goo.gl o maps.app.goo.gl — necesita resolver redirect
    if (!lat && (raw.includes('goo.gl') || raw.includes('maps.app'))) {
      setStatus('🔄 Resolviendo link corto...', true);
      // Usamos un proxy CORS público para resolver el redirect
      const resolved = await resolveShortLink(raw);
      if (resolved) {
        m = resolved.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
        if (m) { lat = parseFloat(m[1]); lon = parseFloat(m[2]); }
        if (!lat) {
          m = resolved.match(/[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/);
          if (m) { lat = parseFloat(m[1]); lon = parseFloat(m[2]); }
        }
        // Intentar extraer nombre del lugar de la URL expandida
        const nameM = resolved.match(/maps\/place\/([^/@]+)/);
        if (nameM) placeName = decodeURIComponent(nameM[1].replace(/\+/g,' '));
      }
    }

    // Extraer nombre del lugar de URL larga
    if (!placeName) {
      const nameM = raw.match(/maps\/place\/([^/@?]+)/);
      if (nameM) placeName = decodeURIComponent(nameM[1].replace(/\+/g,' '));
    }

    if (!lat || !lon) {
      // Último recurso: si el link tiene un nombre de lugar, geocodificar con Nominatim
      if (placeName) {
        setStatus('🔍 Buscando lugar por nombre...', true);
        const r = await nominatim(placeName + ', Colombia');
        if (r) { lat = parseFloat(r.lat); lon = parseFloat(r.lon); }
      }
    }

    if (!lat || !lon) {
      throw new Error(
        'No se pudieron extraer coordenadas del link.\n' +
        'Asegúrate de usar <b>"Compartir → Copiar enlace"</b> en Google Maps, ' +
        'o prueba el modo <b>"Escribir dirección"</b>.'
      );
    }

    destLat = lat; destLon = lon;
    const label = placeName || `${lat.toFixed(6)}, ${lon.toFixed(6)}`;

    // Obtener nombre del lugar con reverse geocoding (Nominatim es gratis)
    const rev = await reverseGeocode(lat, lon);
    const display = rev || label;

    showDestOnMap(lat, lon, label);
    setStatus('', false);

    document.getElementById('confirm-name').textContent = '📌 ' + label;
    document.getElementById('confirm-meta').innerHTML =
      `<span style="color:#0f0">✅ Coordenadas exactas de Google Maps</span><br>` +
      `<small style="color:#888">${display}</small>`;
    document.getElementById('confirm-panel').style.display = 'block';

  } catch(e) {
    setStatus('❌ ' + e.message, true);
  }
}

// Resolver link corto mediante proxy CORS
async function resolveShortLink(url) {
  // Usamos allorigins como proxy para seguir el redirect
  try {
    const proxy = 'https://api.allorigins.win/get?url=' + encodeURIComponent(url);
    const r = await fetch(proxy);
    const d = await r.json();
    // allorigins devuelve la URL final en el header o en el contenido
    if (d.status && d.status.url) return d.status.url;
    // Intentar extraer de la respuesta HTML
    const urlMatch = (d.contents || '').match(/href="(https:\/\/www\.google\.com\/maps[^"]+)"/);
    if (urlMatch) return urlMatch[1];
  } catch(e) { console.warn('Proxy falló:', e); }
  return null;
}

// Reverse geocoding con Nominatim (para mostrar dirección legible)
async function reverseGeocode(lat, lon) {
  try {
    const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=es`;
    const r = await fetch(url, { headers: {'Accept-Language':'es'} });
    const d = await r.json();
    return d.display_name || null;
  } catch(e) { return null; }
}

// ════════════════════════════════════════════════════════════
// ── MODO 2: Escribir dirección (fallback Nominatim) ─────────
// ════════════════════════════════════════════════════════════
const VIA_MAP = {
  'CRA':'Carrera','CR':'Carrera','KR':'Carrera',
  'CLL':'Calle','CL':'Calle','CLLE':'Calle',
  'AV':'Avenida','AK':'Avenida Carrera','AC':'Avenida Calle',
  'TV':'Transversal','DG':'Diagonal',
};

function parseDir(raw) {
  let s = raw.trim().replace(/\s+/g,' ')
    .replace(/nro\.?/gi,'#').replace(/no\.?\s*/gi,'#');
  s = s.replace(/^([A-Za-z.]+)(\s)/i, (_,a,sp) =>
    (VIA_MAP[a.toUpperCase().replace(/\./g,'')] || a) + sp);

  const re = /^((?:[A-Za-záéíóúÁÉÍÓÚ]+\s?){1,3})\s+(\d+\s?[A-Za-z]?(?:\s?[Bb][Ii][Ss])?)\s*#\s*(\d+[A-Za-z]?)\s*[-–]\s*(\d+)/i;
  const m = s.match(re);
  if (m) return { tipoVia:m[1].trim(), numVia:m[2].trim().replace(/\s/g,''),
    numCruce:m[3].trim(), metros:parseInt(m[4]),
    label:`${m[1].trim()} ${m[2].trim()} #${m[3].trim()}-${m[4]}`, parsed:true };

  const re2 = /^((?:[A-Za-záéíóúÁÉÍÓÚ]+\s?){1,3})\s+(\d+\s?[A-Za-z]?)\s*#\s*(\d+[A-Za-z]?)/i;
  const m2 = s.match(re2);
  if (m2) return { tipoVia:m2[1].trim(), numVia:m2[2].trim().replace(/\s/g,''),
    numCruce:m2[3].trim(), metros:null,
    label:`${m2[1].trim()} ${m2[2].trim()} #${m2[3].trim()}`, parsed:true };

  return { raw:s, label:s, parsed:false };
}

function buildQueries(p, ciudad='Bogotá') {
  if (!p.parsed) return [`${p.raw}, ${ciudad}, Colombia`, `${p.raw}, Colombia`];
  const { tipoVia, numVia, numCruce, metros } = p;
  const cruceBase = numCruce.replace(/[A-Za-z]/g,'');
  const qs = [];
  if (metros) {
    qs.push(`${tipoVia} ${numVia} ${numCruce}-${metros}, ${ciudad}, Colombia`);
    qs.push(`${tipoVia} ${numVia} #${numCruce}-${metros}, ${ciudad}, Colombia`);
  }
  qs.push(`${tipoVia} ${numVia} con ${numCruce}, ${ciudad}, Colombia`);
  if (cruceBase !== numCruce)
    qs.push(`${tipoVia} ${numVia} con ${cruceBase}, ${ciudad}, Colombia`);
  qs.push(`${tipoVia} ${numVia}, ${ciudad}, Colombia`);
  return qs;
}

async function nominatim(q) {
  const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=co&q='
    + encodeURIComponent(q);
  const r = await fetch(url, { headers:{'Accept-Language':'es'} });
  const d = await r.json();
  return d.length ? d[0] : null;
}

async function searchText() {
  const raw = document.getElementById('dest-input').value.trim();
  if (!raw) { setStatus('⚠️ Escribe un destino', true); return; }
  hideConfirmPanel();
  setStatus('🔍 Buscando...', true);

  try {
    const parsed = parseDir(raw);
    const queries = buildQueries(parsed);
    let result = null, usedQ = '';
    for (const q of queries) {
      const r = await nominatim(q);
      if (r) { result = r; usedQ = q; break; }
    }
    if (!result) throw new Error('No se encontró. Prueba pegar un link de Google Maps.');

    destLat = parseFloat(result.lat);
    destLon = parseFloat(result.lon);
    const label = parsed.label || raw;

    showDestOnMap(destLat, destLon, label);
    setStatus('', false);
    document.getElementById('confirm-name').textContent = '📌 ' + label;
    document.getElementById('confirm-meta').innerHTML =
      `<span style="color:#fa0">⚠️ Posición aproximada (Nominatim)</span><br>` +
      `<small style="color:#888">Para mayor precisión usa el link de Google Maps</small>`;
    document.getElementById('confirm-panel').style.display = 'block';
  } catch(e) {
    setStatus('❌ ' + e.message, true);
  }
}

// ── Mapa ─────────────────────────────────────────────────────
function initMap(lat, lon) {
  document.getElementById('map').style.display = 'block';
  if (!map) {
    map = L.map('map').setView([lat, lon], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
      {attribution:'© OpenStreetMap'}).addTo(map);
  }
  if (userLat && !userMarker)
    userMarker = L.circleMarker([userLat, userLon],
      {radius:8, color:'#0ff', fillColor:'#0ff', fillOpacity:0.9})
      .addTo(map).bindPopup('Tu ubicación');
}
function showDestOnMap(lat, lon, name) {
  if (!map) initMap(lat, lon);
  if (destMarker) destMarker.remove();
  destMarker = L.marker([lat, lon]).addTo(map)
    .bindPopup('<b>' + name + '</b>').openPopup();
  const b = userLat
    ? L.latLngBounds([[userLat,userLon],[lat,lon]])
    : L.latLngBounds([[lat,lon],[lat+0.003,lon+0.003]]);
  map.fitBounds(b, {padding:[30,30]});
}
function showRouteOnMap(coords) {
  if (routeLine) routeLine.remove();
  routeLine = L.polyline(coords, {color:'#0ff', weight:4, opacity:0.8}).addTo(map);
  map.fitBounds(routeLine.getBounds(), {padding:[20,20]});
}

// ── Confirmación / cancelar ──────────────────────────────────
function hideConfirmPanel() { document.getElementById('confirm-panel').style.display='none'; }
function cancelDest() {
  hideConfirmPanel();
  document.getElementById('link-input').value = '';
  document.getElementById('dest-input').value = '';
}

// ── Calcular ruta ────────────────────────────────────────────
async function startNav() {
  if (!userLat) { setStatus('⚠️ Esperando GPS...', true); return; }
  hideConfirmPanel();
  setStatus('🛣️ Calculando ruta...', true);
  try {
    const url = 'https://router.project-osrm.org/route/v1/driving/'
      + userLon+','+userLat+';'+destLon+','+destLat
      + '?steps=true&geometries=geojson&overview=full';
    const res  = await fetch(url);
    const data = await res.json();
    if (data.code !== 'Ok') throw new Error('Ruta no disponible');

    const route = data.routes[0];
    steps = [];
    const mapCoords = [];
    for (const c of route.geometry.coordinates) mapCoords.push([c[1], c[0]]);
    showRouteOnMap(mapCoords);

    for (const leg of route.legs)
      for (const step of leg.steps)
        steps.push({
          maneuver: normalizeManeuver(step),
          street:   step.name || 'Sin nombre',
          distance: step.distance,
          duration: step.duration,
          location: step.maneuver.location
        });

    currentStep = 0; navActive = true;
    document.getElementById('stop-btn').style.display  = 'block';
    document.getElementById('nav-panel').style.display = 'flex';
    document.getElementById('speed-badge').style.display = 'flex';

    const totalDist = fmtDist(route.legs.reduce((a,l)=>a+l.distance,0));
    const totalTime = fmtTime(route.legs.reduce((a,l)=>a+l.duration,0));
    document.getElementById('dist-total').textContent = totalDist;
    document.getElementById('eta-val').textContent    = totalTime;

    renderStepList();
    showStep(0);
    setStatus('✅ Navegando — '+totalDist+' · '+totalTime, true);
  } catch(e) { setStatus('❌ '+e.message, true); }
}

// ── Navegación ───────────────────────────────────────────────
function normalizeManeuver(step) {
  const t=step.maneuver.type, m=step.maneuver.modifier||'';
  if(t==='turn'){
    if(m.includes('sharp')&&m.includes('left'))  return'turn-sharp-left';
    if(m.includes('sharp')&&m.includes('right')) return'turn-sharp-right';
    if(m.includes('slight')&&m.includes('left')) return'turn-slight-left';
    if(m.includes('slight')&&m.includes('right'))return'turn-slight-right';
    if(m.includes('left'))  return'turn-left';
    if(m.includes('right')) return'turn-right';
    if(m.includes('uturn')) return'uturn';
  }
  if(t==='rotary'||t==='roundabout') return'roundabout';
  if(t==='depart') return'depart';
  if(t==='arrive') return'arrive';
  if(t==='merge')  return'merge';
  if(t.includes('exit')) return'exit';
  return'straight';
}

function fmtDist(m){ return m>=1000?(m/1000).toFixed(1)+' km':Math.round(m)+' m'; }
function fmtTime(s){ const m=Math.round(s/60); return m<60?m+' min':Math.floor(m/60)+'h '+(m%60)+'min'; }
function haversine(la1,lo1,la2,lo2){
  const R=6371000,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function showStep(idx) {
  if (idx >= steps.length) return;
  const s = steps[idx];
  const spdTxt = currentSpeed > 0 ? currentSpeed+' km/h' : '';
  document.getElementById('arrow-box').textContent     = ARROWS[s.maneuver]||'⬆️';
  document.getElementById('maneuver-text').textContent = MANEUVER_ES[s.maneuver]||'Continúa';
  document.getElementById('distance-text').textContent = fmtDist(s.distance);
  document.getElementById('street-name').textContent   = s.street;
  document.querySelectorAll('.step-item').forEach((el,i)=>
    el.classList.toggle('active-step', i===idx));
  sendToDisplay(s.maneuver, s.street, fmtDist(s.distance), spdTxt,
    document.getElementById('eta-val').textContent);
}

function updateStep() {
  if (!navActive || currentStep >= steps.length) return;
  const s    = steps[currentStep];
  const dist = haversine(userLat, userLon, s.location[1], s.location[0]);

  // Actualizar velocidad en display
  const spdTxt = currentSpeed > 0 ? currentSpeed+' km/h' : '';
  document.getElementById('speed-val').textContent = currentSpeed;

  if (dist < 25 && currentStep+1 < steps.length) {
    currentStep++;
    renderStepList();
    showStep(currentStep);
  } else {
    document.getElementById('distance-text').textContent = fmtDist(dist);
    sendToDisplay(steps[currentStep].maneuver, steps[currentStep].street,
      fmtDist(dist), spdTxt, document.getElementById('eta-val').textContent);
  }
}

function renderStepList() {
  const el = document.getElementById('step-list');
  el.innerHTML = '';
  steps.forEach((s,i) => {
    const d = document.createElement('div');
    d.className = 'step-item'+(i===currentStep?' active-step':'');
    d.innerHTML = `<span style="font-size:1.3rem">${ARROWS[s.maneuver]||'⬆️'}</span>
                   <span class="step-dist">${fmtDist(s.distance)}</span>
                   <span>${s.street||'Sin nombre'}</span>`;
    el.appendChild(d);
  });
}

async function stopNav() {
  navActive=false; steps=[]; currentStep=0;
  document.getElementById('nav-panel').style.display  = 'none';
  document.getElementById('stop-btn').style.display   = 'none';
  document.getElementById('speed-badge').style.display= 'none';
  document.getElementById('step-list').innerHTML = '';
  if (routeLine){ routeLine.remove(); routeLine=null; }
  setStatus('⏹️ Navegación detenida', true);
  if (ws && ws.readyState===WebSocket.OPEN)
    ws.send(JSON.stringify({maneuver:'straight',street:'',distance:'',eta:'',speed:''}));
}

function setStatus(html, show) {
  const el = document.getElementById('status');
  el.innerHTML = html;
  el.style.display = (show && html) ? 'block' : 'none';
}

window.onload = startGPS;
</script>
